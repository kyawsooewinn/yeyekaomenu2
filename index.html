<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>夜夜烤 - 在线点餐</title>
    <style>
        :root {
            --ios-orange: #ff4500;
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.8);
            --glass: blur(25px) saturate(180%);
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            background: var(--ios-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            padding-bottom: env(safe-area-inset-bottom);
            color: #ffffff;
        }

        #p-bar-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 2px; z-index: 3000; }
        #p-bar { width: 0%; height: 100%; background: var(--ios-orange); transition: width 0.4s; }

        .banner { width: 94%; aspect-ratio: 1200 / 500; margin: 10px auto; border-radius: var(--radius); overflow: hidden; position: relative; }
        .b-wrap { display: flex; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; }
        .b-wrap::-webkit-scrollbar { display: none; } 
        .b-slide { min-width: 100%; height: 100%; scroll-snap-align: start; }
        .b-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .tabs { display: flex; overflow-x: auto; padding: 12px 15px; gap: 8px; position: sticky; top: 0; z-index: 90; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 6px 16px; background: #1c1c1e; border-radius: 18px; font-size: 13px; white-space: nowrap; border: 0.5px solid rgba(255,255,255,0.05); color: #8e8e93; }
        .tab.active { background: var(--ios-orange); color: white; }

        .container { padding: 0 10px; }

        .cat-h { 
            display: flex; align-items: center; font-size: 15px; font-weight: 700; 
            margin: 20px -10px 15px -10px; padding: 10px 20px; 
            background: #1c1c1e; color: #fff;
            border-left: 4px solid var(--ios-orange); 
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
            letter-spacing: 1px; text-transform: uppercase;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { position: relative; aspect-ratio: 1; background: #1c1c1e; border-radius: var(--radius); overflow: hidden; border: 0.5px solid rgba(255,255,255,0.1); }
        .c-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .c-glass-info { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.6) 80%, transparent 100%); padding: 5px 8px; display: flex; flex-direction: column; justify-content: flex-end; height: 28%; }
        .c-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .c-name { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
        .c-price { color: var(--ios-orange); font-weight: 700; font-size: 12px; }
        .c-control-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.12); border-radius: 8px; padding: 1px; width: 100%; height: 26px; }
        .btn-act { flex: 1; height: 100%; border: none; background: transparent; color: white; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-act:active { background: rgba(255,255,255,0.2); border-radius: 6px; }
        .badge { position: absolute; top: 8px; right: 8px; background: var(--ios-orange); color: white; min-width: 28px; height: 28px; border-radius: 14px; font-size: 14px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.6); z-index: 10; transform: scale(0); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .badge.show { transform: scale(1); }
        
        .island-footer { position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(120px); width: 90%; max-width: 400px; background: rgba(30, 30, 30, 0.85); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); padding: 10px 10px 10px 22px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-radius: 50px; border: 0.5px solid rgba(255,255,255,0.2); transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        .island-footer.active { transform: translateX(-50%) translateY(0); }
        .btn-go { background: var(--ios-orange); border: none; color: white; padding: 12px 24px; border-radius: 40px; font-weight: 800; font-size: 15px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-c { background: #1c1c1e; border-radius: 24px; padding: 20px; max-width: 500px; margin: 20px auto; border: 0.5px solid rgba(255,255,255,0.1); }
        .o-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .o-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .btn-s { width: 34px; height: 34px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        textarea#note { width:100%; padding:10px; margin:12px 0; border-radius:12px; border:none; background: #2c2c2e; color: white; font-size:16px; min-height: 60px; }
        .trash-btn { background: transparent; border: none; color: #8e8e93; font-size: 20px; cursor: pointer; padding: 5px; }

        .fab-container { position: fixed; right: 20px; bottom: calc(85px + env(safe-area-inset-bottom)); z-index: 3000; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
        .fab-main { width: 50px; height: 50px; background: var(--ios-orange); border-radius: 50%; box-shadow: 0 4px 15px rgba(255,69,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 26px; border: none; color: white; transition: 0.3s; }
        .fab-menu { display: none; flex-direction: column; gap: 10px; animation: slideUp 0.3s forwards; }
        .fab-menu.show { display: flex; }
        .fab-item { background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); color: white; padding: 10px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 0.5px solid rgba(255,255,255,0.2); text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; align-items: center; justify-content: center; padding: 40px; }
        .qr-card { background: white; padding: 20px; border-radius: 20px; text-align: center; max-width: 300px; }
        .qr-card img { width: 100%; height: auto; border-radius: 10px; }
        .qr-tip { color: #333; font-size: 13px; margin-top: 10px; font-weight: 700; }

        #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30, 30, 30, 0.95); color: white; padding: 16px 28px; border-radius: 20px; z-index: 5000; backdrop-filter: blur(15px); font-weight: 600; text-align: center; border: 0.5px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="p-bar-wrap"><div id="p-bar"></div></div>

<div class="fab-container">
    <div class="fab-menu" id="fabMenu">
        <a href="tel:09795858978" class="fab-item">📞 <span id="ui-call">呼叫老板</span></a>
        <button class="fab-item" onclick="showQR()">💬 <span id="ui-qr">微信二维码</span></button>
        <button class="fab-item" onclick="toggleLang()">🌐 <span id="ui-lang-text">切换语言</span></button>
    </div>
    <button class="fab-main" onclick="toggleFab()" id="fabMainBtn">🇲🇲</button>
</div>

<div id="qr-modal" onclick="this.style.display='none'">
    <div class="qr-card" onclick="event.stopPropagation()">
        <img src="wechat_qr.jpg" alt="Wechat QR">
        <p class="qr-tip" id="ui-qr-tip">长按识别二维码加微信</p>
    </div>
</div>

<div class="banner"><div class="b-wrap" id="bWrap"></div></div>
<div class="tabs" id="tabBar"></div>
<div class="container" id="menuBody"></div>

<div class="island-footer" id="islandBar">
    <div style="display:flex; flex-direction:column;">
        <span style="font-size:11px; opacity:0.6;"><span id="ui-selected">已选</span> <span id="tQ" style="color:var(--ios-orange);">0</span> <span id="ui-items">件</span></span>
        <span style="font-size:19px; font-weight:900;">Ks <span id="tM">0</span></span>
    </div>
    <button class="btn-go" onclick="showO()" id="ui-confirm-btn">确认下单</button>
</div>

<div class="modal" id="mBox" onclick="if(event.target==this) this.style.display='none'">
    <div class="modal-c" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="width: 30px;"></div>
            <h2 style="font-size:18px; color: var(--ios-orange);" id="ui-modal-title">确认订单</h2>
            <button class="trash-btn" onclick="clearCart()">❌️</button>
        </div>
        <div id="oList" style="max-height: 350px; overflow-y: auto;"></div>
        <textarea id="note" placeholder="备注"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('mBox').style.display='none'" style="flex:1; padding:12px; border:none; background:#2c2c2e; color:#fff; border-radius:15px; font-weight:600;" id="ui-cancel">取消</button>
            <button onclick="openShareSheet()" style="flex:1; padding:12px; border:none; background:var(--ios-orange); color:white; border-radius:15px; font-weight:600;" id="ui-send">发送订单</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_OVg4lIPoqCICZxDttngMWhd0nwIfTQE",
        authDomain: "yeyekaomenu.firebaseapp.com",
        projectId: "yeyekaomenu",
        storageBucket: "yeyekaomenu.firebasestorage.app",
        messagingSenderId: "158971440613",
        appId: "1:158971440613:web:377f5c3fd78120bc27130c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const i18n = {
        zh: {
            selected: "已选", items: "件", confirmBtn: "确认下单", modalTitle: "确认订单",
            notePh: "备注（如：加辣、不要蒜）", cancel: "取消", send: "发送订单",
            clearConfirm: "确定要清空购物车吗？", orderHeader: "🔥 夜夜烤订单",
            orderNote: "备注", orderTotal: "总计",
            call: "呼叫老板", qr: "微信二维码", qrTip: "长按识别二维码加微信", langText: "缅甸语 🇲🇲",
            copySuccess: "✅ 订单已复制！\n请粘贴发送给老板"
        },
        my: {
            selected: "ရွေးချယ်ပြီး", items: "ခု", confirmBtn: "ORDERတင်မည်", modalTitle: "ORDERစစ်ဆေးရန်",
            notePh: "မှတ်ချက် (ဥပမာ-အစပ်လျှော့)", cancel: "ပယ်ဖျက်မည်", send: "ပို့မည်",
            clearConfirm: "Order များဖျက်မှာ သေချာပါသလား?", orderHeader: "🔥 Ye Ye Kao Order",
            orderNote: "မှတ်ချက်", orderTotal: "စုစုပေါင်း",
            call: "ဖုန်းခေါ်ဆိုရန်", qr: "Wechat QR ကုဒ်", qrTip: "QR ကိုနှိပ်ပြီး Wechat အပ်ရန်", langText: "中文 🇨🇳",
            copySuccess: "✅ Order Copy ကူးပြီးပါပြီ"
        }
    };

    window.curLang = localStorage.getItem('yeyekao_lang') || 'zh';
    window.menu = []; window.banners = []; window.cart = {};

    // UI 控制
    window.toggleFab = () => {
        const menu = document.getElementById('fabMenu');
        const btn = document.getElementById('fabMainBtn');
        menu.classList.toggle('show');
        
        if (menu.classList.contains('show')) {
            btn.innerText = '✕'; // 菜单展开时显示关闭按钮
        } else {
            // 菜单关闭时，根据当前语言显示“目标切换”的国旗
            btn.innerText = window.curLang === 'zh' ? '🇲🇲' : '🇨🇳';
        }
    };

    window.showQR = () => {
        document.getElementById('fabMenu').classList.remove('show');
        // 重置按钮为对应国旗
        document.getElementById('fabMainBtn').innerText = window.curLang === 'zh' ? '🇲🇲' : '🇨🇳';
        document.getElementById('qr-modal').style.display = 'flex';
    };

    window.toggleLang = () => {
        window.curLang = window.curLang === 'zh' ? 'my' : 'zh';
        localStorage.setItem('yeyekao_lang', window.curLang);
        document.getElementById('fabMenu').classList.remove('show');
        
        // 切换语言后，立即更新主按钮国旗
        document.getElementById('fabMainBtn').innerText = window.curLang === 'zh' ? '🇲🇲' : '🇨🇳';
        
        applyLang();
        renderM();
    };

    function applyLang() {
        const t = i18n[window.curLang];
        document.getElementById('ui-selected').innerText = t.selected;
        document.getElementById('ui-items').innerText = t.items;
        document.getElementById('ui-confirm-btn').innerText = t.confirmBtn;
        document.getElementById('ui-modal-title').innerText = t.modalTitle;
        document.getElementById('note').placeholder = t.notePh;
        document.getElementById('ui-cancel').innerText = t.cancel;
        document.getElementById('ui-send').innerText = t.send;
        document.getElementById('ui-call').innerText = t.call;
        document.getElementById('ui-qr').innerText = t.qr;
        document.getElementById('ui-qr-tip').innerText = t.qrTip;
        document.getElementById('ui-lang-text').innerText = t.langText;
    }

    // Firebase 监听
    onSnapshot(doc(db, "restaurant", "data"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            window.menu = data.menu_data || [];
            window.banners = data.banners || [];
            const localData = localStorage.getItem('yeyekao_cart');
            if(localData) window.cart = JSON.parse(localData);
            
            applyLang(); 
            renderB(); 
            renderM(); 
            updateGlobalUI();
            
            // 确保加载后图标正确显示
            document.getElementById('fabMainBtn').innerText = window.curLang === 'zh' ? '🇲🇲' : '🇨🇳';
            
            document.getElementById('p-bar').style.width = '100%';
            setTimeout(() => { document.getElementById('p-bar-wrap').style.display='none'; }, 500);
        }
    });

    function renderB() {
        const wrap = document.getElementById('bWrap');
        wrap.innerHTML = window.banners.map(u => `<div class="b-slide"><img src="${u}"></div>`).join('');
    }

    function renderM() {
        const cats = [...new Set(window.menu.map(i => i.category))];
        document.getElementById('tabBar').innerHTML = cats.map(c => `<div class="tab" onclick="document.getElementById('cat-${c}').scrollIntoView({behavior:'smooth'})">${c}</div>`).join('');
        let html = '';
        cats.forEach(c => {
            html += `<div class="cat-h" id="cat-${c}">${c}</div><div class="grid">`;
            window.menu.filter(i => i.category === c).forEach(item => {
                const count = window.cart[item.id] || 0;
                html += `<div class="card" onclick="window.upQ('${item.id}',1)"><div id="badge-${item.id}" class="badge ${count > 0 ? 'show' : ''}">${count}</div><img src="${item.img}" class="c-img" loading="lazy"><div class="c-glass-info"><div class="c-row"><div class="c-name">${item.name}</div><div class="c-price">Ks ${item.price}</div></div><div class="c-control-bar"><button class="btn-act" onclick="event.stopPropagation(); window.upQ('${item.id}',-1)">－</button><span id="q-${item.id}">${count}</span><button class="btn-act" onclick="event.stopPropagation(); window.upQ('${item.id}',1)">＋</button></div></div></div>`;
            });
            html += `</div>`;
        });
        document.getElementById('menuBody').innerHTML = html;
    }

    window.updateGlobalUI = () => {
        let totalQ = 0, totalM = 0;
        for(let k in window.cart) {
            const i = window.menu.find(x => x.id == k);
            if(i) { totalQ += window.cart[k]; totalM += window.cart[k] * i.price; }
        }
        document.getElementById('tQ').innerText = totalQ;
        document.getElementById('tM').innerText = totalM;
        const bar = document.getElementById('islandBar');
        totalQ > 0 ? bar.classList.add('active') : bar.classList.remove('active');
    };

    window.upQ = (id, d) => {
        window.cart[id] = Math.max(0, (window.cart[id] || 0) + d);
        if(window.cart[id] === 0) delete window.cart[id];
        localStorage.setItem('yeyekao_cart', JSON.stringify(window.cart));
        renderM(); updateGlobalUI();
    };

    window.showO = () => {
        let html = '';
        for(let id in window.cart) {
            const i = window.menu.find(x => x.id == id); if(!i) continue;
            html += `<div class="o-item"><img src="${i.img}" class="o-img"><div style="flex:1"><div>${i.name}</div><div style="color:var(--ios-orange);">Ks ${i.price * window.cart[id]}</div></div><div style="display:flex; gap:10px;"><button class="btn-s" onclick="window.upQ('${i.id}',-1); window.showO();">－</button><span>${window.cart[id]}</span><button class="btn-s" onclick="window.upQ('${i.id}',1); window.showO();">＋</button></div></div>`;
        }
        if(!Object.keys(window.cart).length) { document.getElementById('mBox').style.display='none'; return; }
        document.getElementById('oList').innerHTML = html;
        document.getElementById('mBox').style.display = 'block';
    };

    window.clearCart = () => {
        if(confirm(i18n[window.curLang].clearConfirm)) {
            window.cart = {}; localStorage.removeItem('yeyekao_cart');
            renderM(); updateGlobalUI(); document.getElementById('mBox').style.display='none';
        }
    };

    window.openShareSheet = async () => {
        const t = i18n[window.curLang];
        let txt = `${t.orderHeader}\n----------\n`;
        let total = 0;
        for(let id in window.cart) {
            const i = window.menu.find(x => x.id == id);
            if(i) {
                txt += `${i.name} x ${window.cart[id]} = ${i.price * window.cart[id]} Ks\n`;
                total += i.price * window.cart[id];
            }
        }
        txt += `----------\n${t.orderNote}: ${document.getElementById('note').value || '-'}\n${t.orderTotal}: ${total} Ks`;
        try {
            await navigator.clipboard.writeText(txt);
            showToast(t.copySuccess);
            setTimeout(() => { window.location.href = "weixin://"; }, 2000);
        } catch { alert("复制失败，请截图"); }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2500);
    }
</script>
</body>
</html>
